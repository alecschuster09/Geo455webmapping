<!DOCTYPE html>
<html lang="en">
<head>

    <style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
    }
    #container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100%;
    }
    #header {
        position: relative;
        z-index: 1000;
        background-color: black;
        padding: 5px;
        font-family: "Roboto Serif", Helvetica, Corbel, Arial, sans-serif;
        text-align: center;
        color: aliceblue;
    }
    #map {
        flex: 1;
        width: 100%;
    }
    #event {
        margin-top: 5px;
        margin-bottom: 5px;
    }
    .btn {
        background-color: #778899;
        border: 1px solid white;
        color: white;
        text-align: center;
        text-decoration: none;
        font-size: 14px;
        border-radius: 6px;
        width: 80px;
        height: 40px;
        cursor: pointer;
    }
    .btn:hover {
        background-color: #5a6a7a;
    }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">
            <h1>Lab 8: Commute Flow Map to Dane County (2011-2015)</h1>
            <div id="event">
                <input type="button" value="hide" class="btn" onclick="hideLayer()">
                <input type="button" value="show" class="btn" onclick="showLayer()">
                <input type="button" value="pause" class="btn" onclick="pauseLayer()">
                <input type="button" value="play" class="btn" onclick="playLayer()">
            </div>
        </div>
        <div id="map"></div>
        <script src="lab_8.js"></script>
