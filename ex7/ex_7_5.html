<!DOCTYPE html>
<html>
<head>
    <title>Ex-7-5: UI</title>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
            integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
            crossorigin="anonymous"></script>

    <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.min.js"></script> <!-- make sure jQuery UI library js file version and css version are compatible and matches -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.2/themes/ui-lightness/jquery-ui.css">

    <style>
        #calc {
            float: left;
            width: 200px;
            height: 200px;
            cursor: move;
        }

        #exam {
            float: right;
            width: 300px;
            height: 300px;
            border: 4px solid transparent;
        }

        #message {
            clear: both;
            padding-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <script>
        $(function () {
            $("#calc").draggable();

            $("#exam").droppable({
                drop: function () {
                    $(this).css("border", "4px green solid");
                    $("#message").text("Success! Professor Calculus took the exam.");
                }
            });
        });
    </script>

    <h1>Professor Calcus takes the math exam!</h1>

    <div>
        <img id="calc" src="img/prof_calc.jpg" alt="Tintin">
        <img id="exam" src="img/calc_exam.jpg" alt="Moon">
    </div>

    <p id="message">Drag Professor Calculus to the exam.</p>
    
    <p> <a href='geo455_ex7.html'>Back to Main Page</a> </p>


</body>
</html>
