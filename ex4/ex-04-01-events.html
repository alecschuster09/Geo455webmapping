<!DOCTYPE html>
<html>
<body>

<h2>JavaScript HTML Events</h2>
    
    
    <h3>Why is GIS so cool?</h3>
    <button id="myBtn1">Click me to find out!</button>
    <p id="demo1"></p>
    
    
    
    <h3>What's the date today?</h3>
    <button id="myBtn2">Display current date/time</button>
    <p id="demo2"></p>
    
    <h3 onmouseover="style.color='hotpink'" onmouseout="style.color='black'">
        Mouse over this text</h3>

    
    <h3>This example uses the addEventListener() 
        method to add many events on the same button.</h3>
    <button id="myBtn3">Try Me Now!!</button>
    <p id="demo3"></p>
    
    <h4>This is my example</h4>
    <button id="myBtn4">Check out this cool button I made!</button>
    <p id="demo4"></p>

<script>
    
    document.getElementById("myBtn1").addEventListener("click", hello);
    
    function hello() {
        document.getElementById("demo1").innerHTML = 
            "Because it just is and its ever changing!";
            }

    
    
    document.getElementById("myBtn2").addEventListener("click", displayDate);

    function displayDate() {
        document.getElementById("demo2").innerHTML = Date();
    }
    
    
    var x = document.getElementById("myBtn3");
    x.addEventListener("mouseover", myFunction);
    x.addEventListener("click", mySecondFunction);
    x.addEventListener("mouseout", myThirdFunction);
    
    
    function myFunction(){
        document.getElementById("demo3").innerHTML += "You hovered over me!<br>";
    }
    
    function mySecondFunction() {
        document.getElementById("demo3").innerHTML += "You clicked me!<br>";
    }
    
    function myThirdFunction() {
        document.getElementById("demo3").innerHTML += "You are not hovered over me anymore!<br>";
    }
    
    document.getElementById("myBtn4").addEventListener("click", hello);
    
    function hello() {
        document.getElementById("demo4").innerHTML = 
            "my clicking the button function was successful!";
            }
</script>
<p><a href="geo455_ex4.html">Back to Main Page</a></p>
</body>
</html>
